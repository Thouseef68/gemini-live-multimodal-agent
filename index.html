<!DOCTYPE html>

<html>
<head>

<title>Gemini Live Agent</title>
<meta charset="UTF-8">

<style>

body{
font-family:Arial;
background:linear-gradient(120deg,#0f2027,#203a43,#2c5364);
color:white;
text-align:center;
padding:40px;
}

.container{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(15px);
padding:30px;
border-radius:20px;
width:650px;
margin:auto;
box-shadow:0 0 40px rgba(0,0,0,0.5);
}

h1{
font-size:28px;
margin-bottom:10px;
}

button{
background:#00c3ff;
border:none;
padding:12px 20px;
border-radius:8px;
margin:10px;
cursor:pointer;
font-size:16px;
color:white;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
background:#00a2d6;
}

#video{
border-radius:15px;
box-shadow:0 0 20px #00c3ff;
}

.section{
margin-top:25px;
}

p{
font-size:16px;
line-height:1.4;
}

</style>

</head>

<body>

<div class="container">

<h1>Gemini Live Multimodal Agent</h1>

<div class="section">
<button onclick="startVoice()">🎤 Start Voice Command</button>

<h3>You said</h3>
<p id="userText"></p>

<h3>AI Response</h3>
<p id="aiResponse"></p>
</div>

<div class="section">

<h3>Live Camera Vision</h3>

<video id="video" width="420" autoplay></video>

<br>

<button onclick="capture()">Analyze Camera</button> <button onclick="startLiveVision()">Start Live Vision</button> <button onclick="stopLiveVision()">Stop Live Vision</button><button onclick="stopAgent()">⛔ Stop Agent</button>

<p id="visionResult"></p>

</div>

</div>

<script>
function stopAgent(){

analyzing = false;

window.speechSynthesis.cancel();

}
// Start webcam
navigator.mediaDevices.getUserMedia({video:true})
.then(stream=>{
document.getElementById("video").srcObject=stream
})
function speak(text){

// stop any ongoing speech
window.speechSynthesis.cancel()

const speech = new SpeechSynthesisUtterance(text)

speech.rate = 1
speech.pitch = 1
speech.lang = "en-US"

window.speechSynthesis.speak(speech)

}
// Voice recognition
function startVoice(){

const recognition=new(window.SpeechRecognition||window.webkitSpeechRecognition)()

recognition.lang="en-US"

recognition.start()

recognition.onresult=async function(event){

const transcript=event.results[0][0].transcript.toLowerCase()

document.getElementById("userText").innerText=transcript

if(transcript.includes("see")||transcript.includes("look")||transcript.includes("camera")){
await capture()
return
}

const response=await fetch("https://gemini-live-multimodal-agent-wk77.vercel.app/",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({question:transcript})
})

const data=await response.json()

document.getElementById("aiResponse").innerText=data.answer

const speech=new SpeechSynthesisUtterance(data.answer)

window.speechSynthesis.speak(speech)

}

}

// Camera capture
async function capture(){

const video=document.getElementById("video")

const canvas=document.createElement("canvas")

canvas.width=video.videoWidth
canvas.height=video.videoHeight

const ctx=canvas.getContext("2d")

ctx.drawImage(video,0,0)

canvas.toBlob(async function(blob){

let formData=new FormData()

formData.append("file",blob,"frame.jpg")

const res=await fetch("https://gemini-live-agent-74863738813.us-central1.run.app/vision",{
method:"POST",
body:formData
})

const data=await res.json()

document.getElementById("visionResult").innerText=data.analysis

const speech=new SpeechSynthesisUtterance(data.analysis)

window.speechSynthesis.speak(speech)

})

}

// Live vision
let analyzing=false

async function startLiveVision(){

analyzing=true

while(analyzing){

await capture()

await new Promise(r=>setTimeout(r,4000))

}

}

function stopLiveVision(){

analyzing=false

}

</script>

</body>

</html>
