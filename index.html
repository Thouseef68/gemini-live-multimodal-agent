<!DOCTYPE html>
<html>
<head>
<title>Gemini Live Agent</title>
<meta charset="UTF-8">

<style>
body{
    font-family:Arial;
    background:linear-gradient(120deg,#0f2027,#203a43,#2c5364);
    color:white;
    text-align:center;
    padding:40px;
}

.container{
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
    padding:30px;
    border-radius:20px;
    width:650px;
    margin:auto;
    box-shadow:0 0 40px rgba(0,0,0,0.5);
}

button{
    background:#00c3ff;
    border:none;
    padding:12px 20px;
    border-radius:8px;
    margin:10px;
    cursor:pointer;
    font-size:16px;
    color:white;
}

#video{
    border-radius:15px;
    box-shadow:0 0 20px #00c3ff;
}

.section{
    margin-top:25px;
}
</style>
</head>

<body>

<div class="container">

<h1>Gemini Live Multimodal Agent</h1>

<div class="section">
    <button onclick="startVoice()">🎤 Start Voice Command</button>

    <h3>You said</h3>
    <p id="userText"></p>

    <h3>AI Response</h3>
    <p id="aiResponse"></p>
</div>

<div class="section">
    <h3>Live Camera Vision</h3>
    <video id="video" width="420" autoplay></video>
    <br>

    <button onclick="capture()">Analyze Camera</button>
    <button onclick="startLiveVision()">Start Live Vision</button>
    <button onclick="stopLiveVision()">Stop Live Vision</button>
    <button onclick="stopAgent()">⛔ Stop Agent</button>

    <p id="visionResult"></p>
</div>

</div>

<script>

// 🔥 CONFIGURATION
// If your backend is on the same domain, leave this as ""
const BASE_URL = "https://gemini-live-multimodal-agent.vercel.app/"; 

// ==============================
// 🛑 STOP EVERYTHING
// ==============================
function stopAgent(){
    analyzing = false;
    window.speechSynthesis.cancel();
}

// ==============================
// 🎥 START CAMERA
// ==============================
navigator.mediaDevices.getUserMedia({video:true})
.then(stream=>{
    document.getElementById("video").srcObject=stream;
})
.catch(err=>{
    console.error("Camera error:", err);
});

// ==============================
// 🔊 SPEAK FUNCTION
// ==============================
function speak(text){
    window.speechSynthesis.cancel();

    const speech = new SpeechSynthesisUtterance(text);
    speech.rate = 1;
    speech.pitch = 1;
    speech.lang = "en-US";

    window.speechSynthesis.speak(speech);
}

// ==============================
// 🎤 VOICE COMMAND
// ==============================
function startVoice(){
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = "en-US";
    recognition.start();

    recognition.onresult = async function(event){
        try {
            const transcript = event.results[0][0].transcript.toLowerCase();
            document.getElementById("userText").innerText = transcript;

            // Camera trigger
            if(transcript.includes("see") || transcript.includes("look") || transcript.includes("camera")){
                await capture();
                return;
            }

            // 1. Fetch from the API
            const response = await fetch(`${BASE_URL}/api/ask`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ question: transcript })
            });

            if (!response.ok) {
                throw new Error(`Server error: ${response.status}`);
            }

            // 2. Await the JSON data (Fixes Initialization Error)
            const data = await response.json();

            if (data.error) {
                throw new Error(data.error);
            }

            // 3. Update UI and Speak
            document.getElementById("aiResponse").innerText = data.answer;
            speak(data.answer);

        } catch (err) {
            console.error("Voice error:", err);
            document.getElementById("aiResponse").innerText = "Error: " + err.message;
        }
    }
}

// ==============================
// 📸 CAPTURE IMAGE
// ==============================
async function capture(){
    try {
        const video = document.getElementById("video");
        const canvas = document.createElement("canvas");

        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;

        const ctx = canvas.getContext("2d");
        ctx.drawImage(video, 0, 0);

        canvas.toBlob(async function(blob){
            let formData = new FormData();
            formData.append("file", blob, "frame.jpg");

            // Use /api/vision to match standard Vercel/FastAPI routing
            const res = await fetch(`${BASE_URL}/api/vision`, {
                method: "POST",
                body: formData
            });

            if (!res.ok) {
                throw new Error("Vision API failed");
            }

            const data = await res.json();

            document.getElementById("visionResult").innerText = data.analysis;
            speak(data.analysis);
        });

    } catch (err) {
        console.error("Capture error:", err);
        document.getElementById("visionResult").innerText = "Error: " + err.message;
    }
}

// ==============================
// 🔄 LIVE VISION
// ==============================
let analyzing = false;

async function startLiveVision(){
    analyzing = true;
    while(analyzing){
        await capture();
        await new Promise(r => setTimeout(r, 4000));
    }
}

function stopLiveVision(){
    analyzing = false;
}

</script>

</body>
</html>
